<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ROS 2 GPS → Leaflet</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="{{ url_for('static', filename='roslib/roslib.min.js') }}"></script>
  <script src="{{ url_for('static', filename='leaflet/leaflet.js') }}"></script>


  <script>
    // 1️⃣ Start ros2-web-bridge separately:
    //    $ ros2-web-bridge
    //
    // 2️⃣ Connect over WebSocket to it:
    const ros = new ROSLIB.Ros({
      url: 'ws://' + window.location.hostname + ':9090'
    });

    ros.on('connection', () => console.log('✅ Connected to ROS bridge'));
    ros.on('error', (e) => console.error('❌ ROS bridge error:', e));
    ros.on('close', () => console.log('⚠️ ROS bridge closed'));

    // 3️⃣ Init a Leaflet map:
    let firstFix = true;

  // 1️⃣ Initialize at world view (so you don’t assume a start coord)
  const map = L.map('map').setView([0, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 21,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 2️⃣ Place your marker
  const marker = L.marker([0, 0]).addTo(map);

  // 3️⃣ Subscribe to GPS topic
  const gpsTopic = new ROSLIB.Topic({
  ros,
  name: '/fix',                              // match ros2 topic list!
  messageType: 'sensor_msgs/msg/NavSatFix'   // ROS 2 style
});

gpsTopic.subscribe((msg) => {
  // Skip no-fix / invalid messages (status -1 = STATUS_NO_FIX, NaN coords)
  if (msg.status.status < 0 || !isFinite(msg.latitude) || !isFinite(msg.longitude)) {
    console.warn('No GPS fix, skipping update');
    return;
  }

  const lat = msg.latitude, lon = msg.longitude;
  marker.setLatLng([lat, lon]);

  if (firstFix) {
    map.setView([lat, lon], 20);
    firstFix = false;
  } else if (!map.getBounds().contains([lat, lon])) {
    map.panTo([lat, lon]);
  }
});


  </script>
</body>
</html>
